<body>
    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <script src="Build/WebBuild.loader.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
      }

      createUnityInstance(canvas, {
        arguments: [],
        dataUrl: "Build/WebBuild.data.unityweb",
        frameworkUrl: "Build/WebBuild.framework.js.unityweb",
        codeUrl: "Build/WebBuild.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "levant",
        productVersion: "0.1.0",
        warningWindow: (msg) => {
          if (msg.indexOf("is not supported on mobile") !== -1) return;
          console.warn(msg);
        }
      }).then((unityInstance) => {
        
        // --- THE FULLSCREEN TRIGGER ---
        // Clicking the canvas requests the browser to hide all tabs
        canvas.addEventListener("click", () => {
          if (canvas.requestFullscreen) {
            canvas.requestFullscreen();
          } else if (canvas.webkitRequestFullscreen) { /* Safari */
            canvas.webkitRequestFullscreen();
          } else if (canvas.msRequestFullscreen) { /* IE11 */
            canvas.msRequestFullscreen();
          }
          // Lock focus to the game window
          canvas.focus();
        });

      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
