<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>levant</title>
    <style>
      /* Force the gallery to fill the entire browser window beautifully */
      html, body {
        background: #000; /* Deep black background layer */
        width: 100%;
        height: 100%;
        overflow: hidden; /* Strips away web scrollbars */
        padding: 0;
        margin: 0;
        position: relative;
      }
      #unity-canvas {
        width: 100vw !important;
        height: 100vh !important;
        display: block;
        background: #000 !important; 
        
        /* Forces everything inside the canvas buffer to render completely black */
        filter: brightness(0) !important; 
        position: absolute;
        top: 0;
        left: 0;
        z-index: 1;
      }

      /* Animated pulsing center-screen dot indicator */
      #loading-dot {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #fff;
        font-family: monospace;
        font-size: 28px;
        font-weight: bold;
        z-index: 2; 
        user-select: none;
        pointer-events: none;
        
        /* Smooth breathing/pulsing animation loop */
        animation: pulse 1.4s infinite ease-in-out;
      }

      /* The animation sequence that keeps the page feeling alive */
      @keyframes pulse {
        0% { opacity: 0.2; transform: translate(-50%, -50%) scale(0.8); }
        50% { opacity: 1.0; transform: translate(-50%, -50%) scale(1.2); }
        100% { opacity: 0.2; transform: translate(-50%, -50%) scale(0.8); }
      }

      /* Hard-suppresses default engine logo containers or progress elements */
      #unity-loading-bar, 
      .unity-mobile #unity-loading-bar, 
      #unity-logo, 
      .webgl-logo,
      .unity-splash {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
      }
    </style>
  </head>
  <body>
    <div id="loading-dot">.</div>

    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <script src="Build/WebBuild.loader.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");
      var loadingDot = document.querySelector("#loading-dot");

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
      }

      createUnityInstance(canvas, {
        arguments: [],
        dataUrl: "Build/WebBuild.data.unityweb",
        frameworkUrl: "Build/WebBuild.framework.js.unityweb",
        codeUrl: "Build/WebBuild.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "levant",
        productVersion: "0.1.0",
        warningWindow: (msg) => {
          if (msg.indexOf("is not supported on mobile") !== -1) return;
          console.warn(msg);
        }
      }).then((unityInstance) => {
        // --- TIMED REVEAL ---
        // Dropped to 1200ms to tighten up the load time while keeping the splash hidden
        setTimeout(() => {
          canvas.style.setProperty("filter", "none", "important");
          
          if (loadingDot) {
            loadingDot.remove();
          }
        }, 1200); 
        
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
