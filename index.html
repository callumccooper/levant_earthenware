<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>levant</title>
    <style>
      /* Force the gallery to fill the entire browser window beautifully */
      html, body {
        background: #000; /* Deep black background layer */
        width: 100%;
        height: 100%;
        overflow: hidden; /* Strips away web scrollbars */
        padding: 0;
        margin: 0;
      }
      #unity-canvas {
        width: 100vw !important;
        height: 100vh !important;
        display: block;
        background: #000 !important; 
        opacity: 0; /* Starts completely hidden to mask the engine splash */
      }

      /* Hard-suppresses default engine logo containers or progress elements */
      #unity-loading-bar, 
      .unity-mobile #unity-loading-bar, 
      #unity-logo, 
      .webgl-logo,
      .unity-splash {
        display: none !important;
        visibility: hidden !important;
        opacity: 0 !important;
      }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <script src="Build/WebBuild.loader.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      // Automatically configure the viewport scales if mobile is active
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
      }

      createUnityInstance(canvas, {
        arguments: [],
        dataUrl: "Build/WebBuild.data.unityweb",
        frameworkUrl: "Build/WebBuild.framework.js.unityweb",
        codeUrl: "Build/WebBuild.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "levant",
        productVersion: "0.1.0",
        warningWindow: (msg) => {
          if (msg.indexOf("is not supported on mobile") !== -1) return;
          console.warn(msg);
        }
      }).then((unityInstance) => {
        // --- THE INSTANT CUT ---
        // Snaps the canvas to fully visible immediately upon initialization
        canvas.style.opacity = "1";
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
